services:
  # Backend NestJS service
  - type: web
    name: stock-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm run build && npx prisma db push
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stock-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: stock-db
    plan: free
    postgresVersion: 15
